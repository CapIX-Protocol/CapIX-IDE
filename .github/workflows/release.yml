name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Capix IDE ${{ github.ref_name }}
          body: |
            ## Capix IDE ${{ github.ref_name }}

            The AI IDE for the Capix protocol.
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20.18.2
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.2"

      - name: Clone upstream source
        run: bash scripts/bootstrap.sh
        env:
          VSCODE_DIR: ${{ github.workspace }}/vscode

      - name: Install native deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev python-is-python3

      - name: Install deps
        run: npm install
        working-directory: vscode

      - name: Build Capix IDE
        run: bash scripts/build.sh
        env:
          VSCODE_DIR: ${{ github.workspace }}/vscode
          VSCODE_ARCH: ${{ matrix.arch }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CapixIDE-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            vscode/dist/
            vscode/../VSCode-*/
            vscode/out/

  publish:
    name: Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
