name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true
      release_tag:
        description: "Existing release tag to update (e.g. v1.1.0)"
        required: true

permissions:
  contents: write

env:
  # Immutable Capix Code runtime paired with this CapixIDE release.
  CAPIX_CODE_SHA: 3c7d24bdfc25cbd54f632867f3b9de2c8a50912a

jobs:
  validate:
    name: Validate release identity and source gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node 20.18.2
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.18.2"

      - name: Bind version, tag and source commit
        shell: bash
        run: |
          bash scripts/verify-release-inputs.sh \
            "${{ inputs.version || github.ref_name }}" \
            "${{ inputs.release_tag || github.ref_name }}" \
            "${{ github.sha }}"

      - name: Run extension unit, compile and branding gates
        run: bash scripts/run-extension-gates.sh

  create-release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify customer documentation branding
        run: node scripts/scan-customer-branding.mjs --source-only

      - name: Create or update release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: Capix IDE ${{ inputs.release_tag || github.ref_name }} (UNSIGNED)
          body: |
            ## Capix IDE ${{ inputs.release_tag || github.ref_name }} — UNSIGNED

            The AI IDE for the Capix protocol.

            **⚠️ This artifact is UNSIGNED. Verify checksums before use.**

            ### SHA-256 Verification

            Download the archive and its adjacent `.sha256` file for your platform and verify:
            ```bash
            sha256sum -c CapixIDE-*.sha256
            ```
            If checksums do not match, **do not use** the artifact.

            ### Source commit

            ```
            ${{ github.sha }}
            ```

            ## Installation (UNSIGNED)

            This artifact is unsigned. To install on macOS:
            1. Download the `.tar.gz` archive and adjacent `.sha256` file for your architecture
            2. Verify it: `shasum -a 256 -c CapixIDE-*.tar.gz.sha256`
            3. Extract it, copy `CapixIDE.app` to Applications, then control-click → Open

            ### Windows Installation (UNSIGNED)

            This artifact is unsigned. To install on Windows:
            1. Download the `.zip` archive and adjacent `.sha256` file
            2. Verify it with `Get-FileHash` as documented in `INSTALL.md`
            3. Extract it and run `CapixIDE.exe`; if SmartScreen appears, click "More info" → "Run anyway"

            ### Linux Installation

            1. Download the `.tar.gz` archive and adjacent `.sha256` file
            2. Verify it: `sha256sum -c CapixIDE-*.tar.gz.sha256`
            3. Extract it and follow the user-local installation commands in `INSTALL.md`

            If checksums do not match, the artifact may be tampered with — **do not install**.

            Source commit: ${{ github.sha }}
          # Keep the release out of `/releases/latest` until the mandatory
          # platform matrix and exact asset checks have succeeded.
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-2022
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node 22 for Capix Code runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.14"

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-23

      - name: Install native prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential g++ libdbus-1-dev libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev libssl-dev pkg-config python-is-python3

      - name: Clone and pin Capix Code runtime
        shell: bash
        run: |
          echo "Capix Code runtime SHA: $CAPIX_CODE_SHA"
          echo "$CAPIX_CODE_SHA" > capix-code-runtime-sha.txt
          git clone --depth 1 https://github.com/CapIX-Protocol/CapIX-Code.git ../capix-code
          cd ../capix-code && git fetch --depth 1 origin $CAPIX_CODE_SHA && git checkout $CAPIX_CODE_SHA

      - name: Build pinned Capix Code runtime for this platform
        shell: bash
        run: |
          bash ../capix-code/scripts/bootstrap.sh
          bash ../capix-code/scripts/rebrand.sh
          bash ../capix-code/scripts/install-config.sh
          bash ../capix-code/scripts/build.sh

      - name: Setup Node 20.18.2 for IDE build
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.18.2"

      - name: Setup Python 3.12 for node-gyp
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Clone upstream source
        run: bash scripts/bootstrap.sh
        env:
          VSCODE_DIR: ${{ github.workspace }}/vscode

      - name: Use portable node-gyp launcher (Windows)
        if: runner.os == 'Windows'
        working-directory: vscode
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const file = 'build/npm/preinstall.js';
          let source = fs.readFileSync(file, 'utf8');
          const edits = [
            ["const node_gyp = path.join(__dirname, 'gyp', 'node_modules', '.bin', 'node-gyp.cmd');", "const node_gyp = process.execPath;\n\tconst node_gyp_script = path.join(__dirname, 'gyp', 'node_modules', 'node-gyp', 'bin', 'node-gyp.js');"],
            ["cp.execFileSync(node_gyp, ['list'], { encoding: 'utf8', shell: true })", "cp.execFileSync(node_gyp, [node_gyp_script, 'list'], { encoding: 'utf8' })"],
            ["cp.execFileSync(node_gyp, ['install', '--dist-url', local.disturl, local.target], { shell: true });", "cp.execFileSync(node_gyp, [node_gyp_script, 'install', '--dist-url', local.disturl, local.target]);"],
            ["cp.execFileSync(node_gyp, ['install', '--dist-url', remote.disturl, remote.target], { shell: true });", "cp.execFileSync(node_gyp, [node_gyp_script, 'install', '--dist-url', remote.disturl, remote.target]);"],
          ];
          for (const [from, to] of edits) {
            const matches = source.split(from).length - 1;
            if (matches !== 1) throw new Error(`node-gyp launcher context mismatch: expected 1, found ${matches}`);
            source = source.replace(from, to);
          }
          fs.writeFileSync(file, source);
          NODE

      - name: Install deps
        run: npm install --ignore-scripts
        working-directory: vscode

      - name: Install pinned node-gyp build driver
        run: npm ci --ignore-scripts
        working-directory: vscode/build/npm/gyp

      - name: Install postinstall workspaces without lifecycle scripts
        working-directory: vscode
        shell: bash
        run: npm_command='install --ignore-scripts' node build/npm/postinstall.js

      - name: Patch pinned fmt compatibility
        working-directory: vscode
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const file = 'node_modules/@vscode/spdlog/deps/spdlog/include/spdlog/fmt/bundled/core.h';
          const before = '  ignore_unused(default_value);';
          const after = '  (void)default_value;';
          const constevalBefore = '#    define FMT_CONSTEVAL consteval';
          const constevalAfter = '#    define FMT_CONSTEVAL constexpr';
          let source = fs.readFileSync(file, 'utf8');
          for (const [from, to] of [[before, after], [constevalBefore, constevalAfter]]) {
            const matches = source.split(from).length - 1;
            if (matches !== 1) throw new Error(`fmt compatibility context mismatch: expected 1, found ${matches}`);
            source = source.replace(from, to);
          }
          fs.writeFileSync(file, source);
          NODE

      - name: Hydrate pinned ripgrep artifact
        shell: bash
        run: |
          set -euo pipefail
          for package_dir in \
            vscode/build/node_modules/@vscode/ripgrep \
            vscode/node_modules/@vscode/ripgrep
          do
            test -f "$package_dir/package.json"
            (
              cd "$package_dir"
              npm rebuild
              # The verified binary is now hydrated. Prevent the subsequent
              # broad rebuild from re-running this downloader without its
              # narrowly scoped token.
              npm pkg delete scripts.postinstall
            )
          done
        env:
          # Limit the workflow token to the one pinned downloader that needs
          # authenticated GitHub API capacity. Do not expose it to all lifecycle scripts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dependency lifecycle builds
        run: npm rebuild
        working-directory: vscode
        env:
          npm_config_python: python

      - name: Build Capix IDE
        run: bash scripts/build.sh
        env:
          VSCODE_DIR: ${{ github.workspace }}/vscode
          VSCODE_ARCH: ${{ matrix.arch }}

      - name: Verify compiled runtime registration
        shell: bash
        run: VSCODE_DIR="${{ github.workspace }}/vscode" node scripts/verify-runtime-registration.mjs --compiled

      - name: Package and statically verify release artifact
        shell: bash
        run: bash scripts/package-release.sh "${{ inputs.version || github.ref_name }}" "${{ matrix.platform }}" "${{ matrix.arch }}"

      - name: Generate fail-closed SBOM, provenance and notices
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          version="${{ inputs.version || github.ref_name }}"
          base="CapixIDE-${version}-${{ matrix.platform }}-${{ matrix.arch }}-unsigned"
          cp NOTICE "release-artifacts/${base}.NOTICE.txt"
          cp capix-code-runtime-sha.txt "release-artifacts/${base}.capix-code-runtime-sha.txt"
          (
            cd vscode
            npx --yes @cyclonedx/cyclonedx-npm@6.0.0 \
              --output-file "../release-artifacts/${base}.sbom.json" \
              --output-format JSON \
              --validate \
              --ignore-npm-errors
          )
          node - "release-artifacts/${base}.sbom.json" <<'NODE'
          const fs = require('fs');
          const file = process.argv[2];
          const sbom = JSON.parse(fs.readFileSync(file, 'utf8'));
          if (sbom.bomFormat !== 'CycloneDX' || !sbom.specVersion || !Array.isArray(sbom.components)) {
            throw new Error(`invalid or incomplete CycloneDX SBOM: ${file}`);
          }
          NODE
          node - "release-artifacts/${base}.provenance.json" <<'NODE'
          const fs = require('fs');
          const output = process.argv[2];
          const document = {
            schemaVersion: 1,
            product: 'CapixIDE',
            version: process.env.RELEASE_VERSION,
            platform: process.env.RELEASE_PLATFORM,
            architecture: process.env.RELEASE_ARCH,
            channel: 'unsigned-portable',
            signed: false,
            sourceRepository: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY,
            sourceCommit: process.env.GITHUB_SHA,
            sourceTag: process.env.RELEASE_TAG,
            workflowRun: process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID,
            capixCodeCommit: fs.readFileSync('capix-code-runtime-sha.txt', 'utf8').trim(),
          };
          fs.writeFileSync(output, JSON.stringify(document, null, 2) + '\n');
          NODE
          test -s "release-artifacts/${base}.NOTICE.txt"
          test -s "release-artifacts/${base}.capix-code-runtime-sha.txt"
          test -s "release-artifacts/${base}.sbom.json"
          test -s "release-artifacts/${base}.provenance.json"
        env:
          RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_ARCH: ${{ matrix.arch }}

      - name: Generate SHA-256 checksums
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            find . -maxdepth 1 -type f ! -name "*.checksums.sha256" -exec sha256sum {} \; | sort > "CapixIDE-${{ inputs.version || github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}-unsigned.checksums.sha256"
          else
            find . -maxdepth 1 -type f ! -name "*.checksums.sha256" -exec shasum -a 256 {} \; | sort > "CapixIDE-${{ inputs.version || github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}-unsigned.checksums.sha256"
          fi
          checksums="CapixIDE-${{ inputs.version || github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}-unsigned.checksums.sha256"
          if [ -s "$checksums" ]; then
            echo "=== SHA-256 Checksums ==="
            cat "$checksums"
          else
            echo "::error::No build artifacts found for checksum generation"
            exit 1
          fi

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: CapixIDE-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release-artifacts/
          retention-days: 7

  publish:
    name: Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: needs.create-release.result == 'success' && needs.build.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist

      - name: Assemble collision-free customer assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f -name 'CapixIDE-*' -exec cp {} release-assets/ \;
          version="${{ inputs.version || github.ref_name }}"
          required=(
            "CapixIDE-${version}-darwin-arm64-unsigned.tar.gz"
            "CapixIDE-${version}-darwin-x64-unsigned.tar.gz"
            "CapixIDE-${version}-linux-x64-unsigned.tar.gz"
            "CapixIDE-${version}-win32-x64-unsigned.zip"
          )
          for archive in "${required[@]}"; do
            base="${archive%.tar.gz}"
            base="${base%.zip}"
            test -s "release-assets/$archive"
            test -s "release-assets/$archive.sha256"
            test -s "release-assets/${base}.source-commit.txt"
            test -s "release-assets/${base}.sbom.json"
            test -s "release-assets/${base}.provenance.json"
            test -s "release-assets/${base}.NOTICE.txt"
            test -s "release-assets/${base}.capix-code-runtime-sha.txt"
            test -s "release-assets/${base}.checksums.sha256"
            test "$(cat "release-assets/${base}.source-commit.txt")" = "${{ github.sha }}"
          done
          for archive in release-assets/*.tar.gz release-assets/*.zip; do
            [ -e "$archive" ] || continue
            test -s "$archive.sha256"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release-assets/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
