name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Capix IDE ${{ github.ref_name }} (UNSIGNED)
          body: |
            ## Capix IDE ${{ github.ref_name }} — UNSIGNED

            The AI IDE for the Capix protocol.

            **⚠️ This artifact is UNSIGNED. Verify checksums before use.**

            ### SHA-256 Verification

            Download the `checksums-*.sha256` file for your platform and verify:
            ```bash
            sha256sum -c checksums-*.sha256
            ```
            If checksums do not match, **do not use** the artifact.

            ### Source commit

            ```
            ${{ github.sha }}
            ```

            ## Installation (UNSIGNED)

            This artifact is unsigned. To install on macOS:
            1. Download the DMG
            2. Verify SHA-256: `shasum -a 256 CapixIDE-*.dmg`
            3. Open with Gatekeeper bypass: right-click → Open (or `xattr -cr /Applications/CapixIDE.app`)

            ### Windows Installation (UNSIGNED)

            This artifact is unsigned. To install on Windows:
            1. Download the `.exe` installer
            2. Verify SHA-256: `certutil -hashfile CapixIDE-*.exe SHA256`
            3. If SmartScreen appears, click "More info" → "Run anyway"

            ### Linux Installation

            1. Download the `.AppImage` or `.deb`
            2. Verify SHA-256: `sha256sum CapixIDE-*.AppImage`
            3. For AppImage: `chmod +x CapixIDE-*.AppImage && ./CapixIDE-*.AppImage`

            If checksums do not match, the artifact may be tampered with — **do not install**.

            Source commit: ${{ github.sha }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20.18.2
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.2"

      - name: Clone upstream source
        run: bash scripts/bootstrap.sh
        env:
          VSCODE_DIR: ${{ github.workspace }}/vscode

      - name: Install native deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev python-is-python3

      - name: Install deps
        run: npm install
        working-directory: vscode

      - name: Rebuild native modules (macOS)
        run: npx node-gyp rebuild --directory=node_modules/@vscode/spdlog
        working-directory: vscode
        if: runner.os == 'macOS'

      - name: Build Capix IDE
        run: bash scripts/build.sh
        env:
          VSCODE_DIR: ${{ github.workspace }}/vscode
          VSCODE_ARCH: ${{ matrix.arch }}

      - name: Notarize macOS app
        if: runner.os == 'macOS'
        run: |
          echo "Building unsigned — no Apple Developer ID configured."
          echo "macOS users will need to right-click → Open on first launch."

      - name: Generate SHA-256 checksums
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          cd vscode/dist
          find . -maxdepth 2 -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o \
            -name "*.rpm" -o -name "*.exe" -o -name "*.zip" -o -name "*.tar.gz" \
          \) -exec sha256sum {} \; > checksums.sha256
          if [ -s checksums.sha256 ]; then
            echo "=== SHA-256 Checksums ==="
            cat checksums.sha256
          else
            echo "::error::No build artifacts found for checksum generation"
            exit 1
          fi

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CapixIDE-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            vscode/dist/
            VSCode-*/
            vscode/out/
          retention-days: 7

  publish:
    name: Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
